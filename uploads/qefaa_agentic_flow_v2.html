<style>
@keyframes q2-stream { to { stroke-dashoffset: -32; } }
@keyframes q2-in { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:translateY(0);} }
@keyframes q2-orbit { to { offset-distance: 100%; } }
@keyframes q2-ring { 0%{ transform:scale(.85); opacity:.7;} 100%{ transform:scale(1.5); opacity:0;} }
@keyframes q2-coreglow { 0%,100%{ opacity:.25; transform:scale(.9);} 50%{ opacity:.7; transform:scale(1.12);} }
@keyframes q2-spin { to { transform: rotate(360deg); } }

.q2-stream { stroke-dasharray: 2 7; animation: q2-stream 1.1s linear infinite; }
.q2-node { opacity:0; animation: q2-in .55s ease-out forwards; }
.q2-node rect, .q2-node circle.b { transition: transform .25s ease, filter .25s ease; transform-box: fill-box; transform-origin:center; }
.q2-node:hover rect, .q2-node:hover circle.b { transform: translateY(-3px) scale(1.04); }
.q2-loop { stroke-dasharray: 5 7; animation: q2-stream 1.5s linear infinite reverse; transform-box: fill-box; transform-origin:340px 232px; }
.q2-orbit { offset-path: path('M 340 232 m -94,0 a 94,47 0 1,1 188,0 a 94,47 0 1,1 -188,0'); animation: q2-orbit 3.6s linear infinite; }
.q2-orbit2 { offset-path: path('M 340 232 m -94,0 a 94,47 0 1,1 188,0 a 94,47 0 1,1 -188,0'); animation: q2-orbit 3.6s linear infinite; animation-delay:-1.8s; }
.q2-coreglow { transform-box: fill-box; transform-origin:center; animation: q2-coreglow 2.8s ease-in-out infinite; }
.q2-ring { transform-box: fill-box; transform-origin:center; animation: q2-ring 2.8s ease-out infinite; }
.q2-ring2 { transform-box: fill-box; transform-origin:center; animation: q2-ring 2.8s ease-out infinite; animation-delay:1.4s; }
.q2-spin { transform-box: fill-box; transform-origin:center; animation: q2-spin 14s linear infinite; }

@media (prefers-reduced-motion: reduce) {
  .q2-stream,.q2-loop { animation:none; stroke-dasharray:none; }
  .q2-node { opacity:1; animation:none; }
  .q2-orbit,.q2-orbit2,.q2-ring,.q2-ring2,.q2-spin { display:none; }
  .q2-coreglow { animation:none; opacity:.45; }
}
.n1{animation-delay:.05s}.n2{animation-delay:.2s}.n3{animation-delay:.55s}.n4{animation-delay:.68s}
.n5{animation-delay:.81s}.n6{animation-delay:1s}
</style>
