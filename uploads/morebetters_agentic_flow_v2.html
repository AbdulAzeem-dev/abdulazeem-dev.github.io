<style>
@keyframes m2-stream { to { stroke-dashoffset: -32; } }
@keyframes m2-in { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:translateY(0);} }
@keyframes m2-orbit { to { offset-distance: 100%; } }
@keyframes m2-ring { 0%{ transform:scale(.85); opacity:.7;} 100%{ transform:scale(1.5); opacity:0;} }
@keyframes m2-coreglow { 0%,100%{ opacity:.25; transform:scale(.9);} 50%{ opacity:.7; transform:scale(1.12);} }
@keyframes m2-spin { to { transform: rotate(360deg); } }

.m2-stream { stroke-dasharray: 2 7; animation: m2-stream 1.1s linear infinite; }
.m2-node { opacity:0; animation: m2-in .55s ease-out forwards; }
.m2-node rect, .m2-node circle.b { transition: transform .25s ease; transform-box: fill-box; transform-origin:center; }
.m2-node:hover rect, .m2-node:hover circle.b { transform: translateY(-3px) scale(1.04); }
.m2-loop { stroke-dasharray: 5 7; animation: m2-stream 1.5s linear infinite reverse; }
.m2-orbit { offset-path: path('M 340 232 m -94,0 a 94,47 0 1,1 188,0 a 94,47 0 1,1 -188,0'); animation: m2-orbit 3.6s linear infinite; }
.m2-orbit2 { offset-path: path('M 340 232 m -94,0 a 94,47 0 1,1 188,0 a 94,47 0 1,1 -188,0'); animation: m2-orbit 3.6s linear infinite; animation-delay:-1.8s; }
.m2-coreglow { transform-box: fill-box; transform-origin:center; animation: m2-coreglow 2.8s ease-in-out infinite; }
.m2-ring { transform-box: fill-box; transform-origin:center; animation: m2-ring 2.8s ease-out infinite; }
.m2-ring2 { transform-box: fill-box; transform-origin:center; animation: m2-ring 2.8s ease-out infinite; animation-delay:1.4s; }
.m2-spin { transform-box: fill-box; transform-origin:center; animation: m2-spin 14s linear infinite; }

@media (prefers-reduced-motion: reduce) {
  .m2-stream,.m2-loop { animation:none; stroke-dasharray:none; }
  .m2-node { opacity:1; animation:none; }
  .m2-orbit,.m2-orbit2,.m2-ring,.m2-ring2,.m2-spin { display:none; }
  .m2-coreglow { animation:none; opacity:.45; }
}
.n1{animation-delay:.05s}.n2{animation-delay:.2s}.n3{animation-delay:.55s}.n4{animation-delay:.68s}
.n5{animation-delay:.9s}
</style>
