<style>
@keyframes ac-stream { to { stroke-dashoffset: -28; } }
@keyframes ac-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ac-trail { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
@keyframes ac-breathe { 0%,100% { opacity: .35; transform: scale(.96); } 50% { opacity: .9; transform: scale(1.04); } }

.ac-stream { stroke-dasharray: 3 9; animation: ac-stream 1.1s linear infinite; }
.ac-card { opacity: 0; animation: ac-in .55s ease-out forwards; }
.ac-card rect { transition: transform .25s ease, filter .25s ease; transform-box: fill-box; transform-origin: center; }
.ac-card:hover rect { transform: translateY(-3px) scale(1.03); }
.ac-halo { transform-box: fill-box; transform-origin: center; animation: ac-breathe 2.8s ease-in-out infinite; }
.ac-pulse { offset-path: path('M 96 70 L 584 70'); animation: ac-trail 2.8s cubic-bezier(.45,0,.55,1) infinite; }

@media (prefers-reduced-motion: reduce) {
  .ac-stream { animation: none; stroke-dasharray: none; }
  .ac-card { opacity: 1; animation: none; }
  .ac-halo { animation: none; opacity: .5; }
  .ac-pulse { display: none; }
}
.c1{animation-delay:.05s}.c2{animation-delay:.2s}.c3{animation-delay:.35s}.c4{animation-delay:.5s}
.h1{animation-delay:0s}.h2{animation-delay:.7s}.h3{animation-delay:1.4s}.h4{animation-delay:2.1s}
</style>
<svg width="100%" viewBox="0 0 680 150" role="img">
<title>Amanah pipeline — animated horizontal card flow</title>
<desc>Four flat cards left to right: Capture, Edge inference, AWS cloud, and Government dashboard, connected by a streaming line with a glowing pulse, each card breathing in sequence.</desc>
<defs>
<radialGradient id="ac-g"><stop offset="0%" stop-color="#5DCAA5" stop-opacity="1"/><stop offset="70%" stop-color="#5DCAA5" stop-opacity=".4"/><stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/></radialGradient>
</defs>

<line x1="96" y1="70" x2="584" y2="70" stroke="#5DCAA5" stroke-width="1" stroke-opacity="0.18"/>
<line x1="96" y1="70" x2="584" y2="70" stroke="#5DCAA5" stroke-width="1.6" class="ac-stream"/>
<circle class="ac-pulse" r="11" fill="url(#ac-g)"/>
<circle class="ac-pulse" r="3" fill="#9FE1CB"/>

<g class="ac-card c1">
<circle class="ac-halo h1" cx="82" cy="70" r="20" fill="url(#ac-g)"/>
<g class="c-gray"><rect x="8" y="34" width="148" height="72" rx="10" stroke-width="0.5"/></g>
<text class="th" x="24" y="58" style="font-size:13px">Capture</text>
<text class="ts" x="24" y="78" style="font-size:11px">Camera + mic</text>
<text class="ts" x="24" y="93" style="font-size:11px">Live feed</text>
</g>

<g class="ac-card c2">
<circle class="ac-halo h2" cx="252" cy="70" r="22" fill="url(#ac-g)"/>
<g class="c-teal"><rect x="178" y="34" width="148" height="72" rx="10" stroke-width="0.5"/></g>
<text class="th" x="194" y="58" style="font-size:13px">Edge inference</text>
<text class="ts" x="194" y="78" style="font-size:11px">6 models · 15 FPS</text>
<text class="ts" x="194" y="93" style="font-size:11px">Raspberry Pi · 10–30ms</text>
</g>

<g class="ac-card c3">
<circle class="ac-halo h3" cx="422" cy="70" r="22" fill="url(#ac-g)"/>
<g class="c-blue"><rect x="348" y="34" width="148" height="72" rx="10" stroke-width="0.5"/></g>
<text class="th" x="364" y="58" style="font-size:13px">AWS cloud</text>
<text class="ts" x="364" y="78" style="font-size:11px">Dockerized CI/CD</text>
<text class="ts" x="364" y="93" style="font-size:11px">EC2 · Lambda · S3</text>
</g>

<g class="ac-card c4">
<circle class="ac-halo h4" cx="595" cy="70" r="22" fill="url(#ac-g)"/>
<g class="c-amber"><rect x="518" y="34" width="154" height="72" rx="10" stroke-width="0.5"/></g>
<text class="th" x="534" y="58" style="font-size:13px">Dashboard</text>
<text class="ts" x="534" y="78" style="font-size:11px">Live verification</text>
<text class="ts" x="534" y="93" style="font-size:11px">Full audit trail</text>
</g>
</svg>
