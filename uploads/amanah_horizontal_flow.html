<style>
@keyframes am-dash { to { stroke-dashoffset: -200; } }
@keyframes am-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes am-glow { 0%,100% { opacity: .4; } 50% { opacity: .9; } }
.am-flow { stroke-dasharray: 6 8; animation: am-dash 2.2s linear infinite; }
.am-node { opacity: 0; animation: am-in .55s ease-out forwards; }
.am-rail { animation: am-glow 3s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .am-flow { animation: none; stroke-dasharray: none; }
  .am-node { opacity: 1; animation: none; }
  .am-rail { animation: none; opacity: .7; }
}
.d1{animation-delay:.05s}.d2{animation-delay:.2s}.d3{animation-delay:.35s}
.d4{animation-delay:.5s}.d5{animation-delay:.65s}.d6{animation-delay:.8s}
.d7{animation-delay:.95s}.d8{animation-delay:1.1s}
</style>
